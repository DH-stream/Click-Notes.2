<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Guide</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-base: #0f0f0f;
      --bg-surface: #141414;
      --bg-raised: #1a1a1a;
      --bg-hover: #202020;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text-primary: #f2f2f2;
      --text-secondary: #9a9a9a;
      --text-muted: #666;
      --danger: #f87171;
      --warn: #facc15;
      --radius: 4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 318px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 1px;
    }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 9px;
      border-bottom: 1px solid var(--border);
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }

    .header-label {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .section {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
    }

    .section:last-child { border-bottom: none; }

    .toolbar, .actions, .row-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .toolbar { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .actions { justify-content: flex-end; margin-top: 10px; }
    .row-actions { flex-wrap: wrap; margin-top: 7px; }

    button, select, input, textarea {
      font: inherit;
      color: var(--text-primary);
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--bg-raised);
      border-radius: var(--radius);
      padding: 6px 9px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 100ms, border-color 100ms;
    }

    button:hover { background: var(--bg-hover); border-color: var(--border-strong); }
    button.primary { background: #f2f2f2; color: #0f0f0f; border-color: transparent; font-weight: 600; }
    button.danger { color: var(--danger); }
    button.ghost { background: transparent; color: var(--text-secondary); }
    button.small { padding: 4px 7px; font-size: 11px; }
    button:disabled { cursor: default; opacity: 0.45; }

    h1, h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .muted {
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      font-size: 10.5px;
      word-break: break-word;
    }

    .list-empty {
      padding: 16px 12px;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
    }

    .guide-row, .step-row {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .guide-row:last-child, .step-row:last-child { border-bottom: none; }

    .row-title {
      font-weight: 600;
      word-break: break-word;
    }

    label {
      display: block;
      color: var(--text-secondary);
      font-size: 11px;
      margin-top: 8px;
      margin-bottom: 4px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #1a1a1a;
      color: var(--text-primary);
      padding: 7px 8px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--border-strong);
    }

    .check {
      display: flex;
      gap: 7px;
      align-items: center;
      margin: 7px 0 0;
      color: var(--text-secondary);
      font-size: 12px;
    }

    .check input { width: auto; }

    .hint {
      margin-top: 8px;
      padding: 7px 8px;
      border: 1px solid rgba(250, 204, 21, 0.2);
      color: #d4d4d4;
      background: rgba(250, 204, 21, 0.07);
      border-radius: var(--radius);
      font-size: 11px;
      line-height: 1.45;
    }

    .status {
      min-height: 24px;
      padding: 6px 12px 10px;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      font-size: 10.5px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo-dot"></div>
      <span class="header-label">Click Guide</span>
    </div>
    <main id="app"></main>
    <div class="status" id="status"></div>
  </div>
  <input id="importFile" type="file" accept="application/json,.json" class="hidden" />
  <script src="guideUtils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
