<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Notes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@400;500;600&display=swap');

    :root {
      color-scheme: dark;
      --bg-base: #0f0f0f;
      --bg-surface: #141414;
      --bg-raised: #1a1a1a;
      --bg-hover: #1f1f1f;
      --border: rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.11);
      --border-strong: rgba(255,255,255,0.16);
      --text-primary: #f2f2f2;
      --text-secondary: #8a8a8a;
      --text-muted: #555;
      --accent: #e8e8e8;
      --accent-stop: rgba(220, 50, 50, 0.18);
      --accent-stop-text: #f87171;
      --radius: 4px;
      --radius-sm: 2px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 268px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 1px;
    }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── Header strip ── */
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 12px 9px;
      border-bottom: 1px solid var(--border);
    }

    .logo-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
      transition: background 200ms;
    }
    .logo-dot.recording {
      background: #ef4444;
      box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-label {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .controls button {
      appearance: none;
      border: none;
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-family: 'Geist', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 9px 10px;
      cursor: pointer;
      transition: background 100ms, color 100ms;
      text-align: center;
    }

    .controls button:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .controls button:active {
      background: #222;
    }

    /* Record button: prominent */
    #recordBtn {
      color: var(--text-primary) !important;
      background: var(--bg-raised) !important;
      font-weight: 600 !important;
    }
    #recordBtn:hover {
      background: #202020 !important;
    }

    /* Stop button */
    #stopBtn {
      display: none;
      color: var(--accent-stop-text) !important;
      background: var(--bg-raised) !important;
      font-weight: 600 !important;
    }
    #stopBtn:hover {
      background: rgba(220, 50, 50, 0.12) !important;
    }

    /* Copy button */
    #copyBtn {
      color: var(--text-primary) !important;
    }

    /* ── Notes area ── */
    #notesList {
      display: flex;
      flex-direction: column;
    }

    #notesList:empty::after {
      content: 'No notes yet';
      display: block;
      padding: 16px 12px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
    }

    .note-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: start;
      gap: 0;
      padding: 9px 12px 9px 0;
      border-bottom: 1px solid var(--border);
      min-height: 36px;
    }

    .note-row:last-child {
      border-bottom: none;
    }

    .num {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 1px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .text {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <div class="logo-dot" id="statusDot"></div>
      <span class="header-label" id="headerLabel">Click Notes</span>
    </div>

    <div class="controls">
      <button id="recordBtn">Record</button>
      <button id="stopBtn">Stop</button>
      <button id="copyBtn">Copy</button>
      <button id="clearBtn">Clear</button>
    </div>

    <div id="notesList"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
