<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Notes</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      padding: 12px;
      width: 260px;
      background: #0b0f14;
      color: #e5e7eb;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .stack { display: grid; gap: 8px; }
    #notesList { display: grid; gap: 6px; margin-top: 4px; }
    .note-row { display: grid; grid-template-columns: 18px 1fr; gap: 6px; font-size: 12px; color: #cbd5e1; }
    .note-row .num { color: #f8fafc; font-weight: 700; }
    .note-row .text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button {
      border: 1px solid #1f2937;
      background: #111827;
      color: #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1f2937; }
    #recordBtn { background: #e5e7eb; color: #0b0f14; border-color: #e5e7eb; }
    #recordBtn:hover { background: #ffffff; }
    #stopBtn { display: none; }
  </style>
</head>
<body>
  <div class="stack">
    <button id="recordBtn">Record</button>
    <button id="stopBtn">Stop</button>
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
    <div id="notesList"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
