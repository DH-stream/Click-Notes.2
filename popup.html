<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click Notes</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 280px;
      color: #111827;
      background: #f9fafb;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .stack { display: grid; gap: 8px; }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    #toggleCapture { background: #111827; color: #fff; }
    #copyNotes { background: #2563eb; color: #fff; }
    #clearNotes { background: #e5e7eb; color: #111827; }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #374151;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h1>Click Notes</h1>
  <div class="stack">
    <button id="toggleCapture">Start capture</button>
    <button id="copyNotes">Copy notes</button>
    <button id="clearNotes">Clear notes</button>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
