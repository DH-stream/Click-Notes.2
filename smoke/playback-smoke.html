<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Click Guide Playback Smoke</title>
  <link rel="stylesheet" href="/contentStyle.css" />
  <script>
    window.__clickGuideMessages = [];
    window.chrome = {
      runtime: {
        id: "smoke-test",
        onMessage: {
          addListener(listener) {
            window.__clickGuideMessages.push(listener);
          },
        },
      },
      storage: {
        local: {
          data: {},
          async get(defaults) {
            return { ...defaults, ...this.data };
          },
          async set(values) {
            this.data = { ...this.data, ...values };
          },
          async remove(keys) {
            for (const key of Array.isArray(keys) ? keys : [keys]) delete this.data[key];
          },
        },
      },
    };
  </script>
  <style>
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f1e8;
      color: #181818;
    }

    main {
      min-height: 150vh;
      padding: 48px;
    }

    .hero {
      max-width: 720px;
      padding: 32px;
      background: #fffaf1;
      border: 1px solid #dfd5c5;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.08);
    }

    .primary {
      margin-top: 22px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .panel {
      margin-top: 620px;
      max-width: 420px;
      padding: 24px;
      background: #18211c;
      color: #f8f5ef;
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p data-guide-id="smoke-intro-label">Internal onboarding portal</p>
      <h1>Book a delivery slot</h1>
      <button class="primary" data-guide-id="smoke-start-button">Start booking</button>
    </section>

    <section class="panel" data-guide-id="smoke-confirm-panel">
      <h2>Confirm shipment details</h2>
      <p>Review the delivery window before submitting anything.</p>
    </section>
  </main>

  <script src="/guideUtils.js"></script>
  <script src="/contentScript.js"></script>
  <script>
    const guide = {
      id: "guide-smoke",
      title: "Smoke guide",
      startUrl: location.origin + "/smoke/playback-smoke.html",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      version: 1,
      steps: [
        {
          id: "step-one",
          order: 1,
          title: "Start booking",
          body: "This is where your colleague points to begin the workflow.",
          pageUrl: location.origin + "/smoke/playback-smoke.html",
          target: {
            selector: '[data-guide-id="smoke-start-button"]',
            fallbackText: "Start booking",
            fallbackTagName: "button",
          },
          playback: {
            showPopup: true,
            highlightTarget: true,
            dimPage: true,
            autoScroll: true,
            popupPlacement: "right",
          },
          advance: { mode: "manual", value: "", allowManualFallback: true },
        },
        {
          id: "step-two",
          order: 2,
          title: "Confirm details",
          body: "The guide scrolls down and points at the confirmation panel.",
          pageUrl: location.origin + "/smoke/playback-smoke.html",
          target: {
            selector: '[data-guide-id="smoke-confirm-panel"]',
            fallbackText: "Confirm shipment details",
            fallbackTagName: "section",
          },
          playback: {
            showPopup: true,
            highlightTarget: true,
            dimPage: true,
            autoScroll: true,
            popupPlacement: "auto",
          },
          advance: { mode: "manual", value: "", allowManualFallback: true },
        },
      ],
    };

    window.addEventListener("load", () => {
      const message = { type: "CLICK_GUIDE_START_PLAYBACK", guide, stepIndex: 0, tabId: 1 };
      window.__clickGuideMessages.forEach((listener) => listener(message, {}, () => {}));
    });
  </script>
</body>
</html>
